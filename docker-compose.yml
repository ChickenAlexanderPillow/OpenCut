services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  serverless-redis-http:
    image: hiett/serverless-redis-http:latest
    ports:
      - "8079:80"
    environment:
      SRH_MODE: env
      SRH_TOKEN: example_token
      SRH_CONNECTION_STRING: "redis://redis:6379"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  local-transcribe:
    build:
      context: ./services/local-transcribe-whisperx
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    ports:
      - "8765:8765"
    volumes:
      - local-transcribe-cache:/root/.cache
    environment:
      - LOCAL_TRANSCRIBE_MODEL=${LOCAL_TRANSCRIBE_MODEL:-medium}
      - LOCAL_TRANSCRIBE_DEVICE=${LOCAL_TRANSCRIBE_DEVICE:-cuda}
      - LOCAL_TRANSCRIBE_COMPUTE_TYPE=${LOCAL_TRANSCRIBE_COMPUTE_TYPE:-int8_float16}
      - LOCAL_TRANSCRIBE_MAX_MODEL_CACHE=${LOCAL_TRANSCRIBE_MAX_MODEL_CACHE:-1}
      - LOCAL_TRANSCRIBE_MAX_ALIGN_CACHE=${LOCAL_TRANSCRIBE_MAX_ALIGN_CACHE:-2}
      - LOCAL_TRANSCRIBE_MAX_CONCURRENCY=${LOCAL_TRANSCRIBE_MAX_CONCURRENCY:-1}
      - LOCAL_TRANSCRIBE_REQUIRE_CUDA=${LOCAL_TRANSCRIBE_REQUIRE_CUDA:-true}
      - LOCAL_TRANSCRIBE_PRIMARY_LANGUAGE=${LOCAL_TRANSCRIBE_PRIMARY_LANGUAGE:-en}
      - LOCAL_TRANSCRIBE_FORCE_PRIMARY_LANGUAGE=${LOCAL_TRANSCRIBE_FORCE_PRIMARY_LANGUAGE:-true}
      - LOCAL_TRANSCRIBE_PREWARM=${LOCAL_TRANSCRIBE_PREWARM:-true}
      - LOCAL_TRANSCRIBE_DIARIZATION=${LOCAL_TRANSCRIBE_DIARIZATION:-true}
      - LOCAL_TRANSCRIBE_HF_TOKEN=${LOCAL_TRANSCRIBE_HF_TOKEN:-}
      - LOCAL_TRANSCRIBE_API_KEY=${LOCAL_TRANSCRIBE_API_KEY:-}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
    gpus: all
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/healthz', timeout=3).read()\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      args:
        - FREESOUND_CLIENT_ID=${FREESOUND_CLIENT_ID}
        - FREESOUND_API_KEY=${FREESOUND_API_KEY}
    restart: unless-stopped
    mem_limit: 1536m
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=1024
      - BETTER_AUTH_SECRET=your-production-secret-key-here
      - UPSTASH_REDIS_REST_URL=http://serverless-redis-http:80
      - UPSTASH_REDIS_REST_TOKEN=example_token
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      - NEXT_PUBLIC_MARBLE_API_URL=https://api.marblecms.com
      - MARBLE_WORKSPACE_KEY=${MARBLE_WORKSPACE_KEY:-placeholder}
      - FREESOUND_CLIENT_ID=${FREESOUND_CLIENT_ID}
      - FREESOUND_API_KEY=${FREESOUND_API_KEY}
      # Transcription (Optional - leave blank to disable auto-captions)
      - CLOUDFLARE_ACCOUNT_ID=${CLOUDFLARE_ACCOUNT_ID:-placeholder}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-placeholder}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-placeholder}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME:-opencut-transcription}
      - MODAL_TRANSCRIPTION_URL=${MODAL_TRANSCRIPTION_URL:-http://localhost:0}
      - LOCAL_TRANSCRIBE_ENABLED=${LOCAL_TRANSCRIBE_ENABLED:-true}
      - LOCAL_TRANSCRIBE_URL=http://local-transcribe:8765
      - LOCAL_TRANSCRIBE_TIMEOUT_MS=${LOCAL_TRANSCRIBE_TIMEOUT_MS:-120000}
      - LOCAL_TRANSCRIBE_API_KEY=${LOCAL_TRANSCRIBE_API_KEY:-}
      - LOCAL_TRANSCRIBE_MODEL=${LOCAL_TRANSCRIBE_MODEL:-medium}
      - LOCAL_TRANSCRIBE_COMPUTE_TYPE=${LOCAL_TRANSCRIBE_COMPUTE_TYPE:-int8_float16}
      - LOCAL_TRANSCRIBE_DEVICE=${LOCAL_TRANSCRIBE_DEVICE:-cuda}
      - LOCAL_TRANSCRIBE_DIARIZATION_ENABLED=${LOCAL_TRANSCRIBE_DIARIZATION_ENABLED:-true}
      - LOCAL_TRANSCRIBE_FALLBACK_OPENAI=${LOCAL_TRANSCRIBE_FALLBACK_OPENAI:-false}
      - EXTERNAL_PROJECTS_ENABLED=${EXTERNAL_PROJECTS_ENABLED:-true}
      - TRANSCRIPT_INGEST_SECRET=${TRANSCRIPT_INGEST_SECRET:-change_me_ingest_secret}
      - THUMBNAIL_API_BASE=${THUMBNAIL_API_BASE:-http://host.docker.internal:9000}
      - OPENCUT_LOCAL_MUSIC_DIR=/host-music
    volumes:
      - "C:\\Users\\Design\\Music:/host-music:ro"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      serverless-redis-http:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  default:
    name: opencut-network

volumes:
  local-transcribe-cache:
